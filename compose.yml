name: chronos

services:
  database:
    image: postgres:18.3-alpine3.23
    container_name: postgres
    restart: always
    env_file: ".env"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DATABASE} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - network

  api:
    image: chronos-api:local
    container_name: backend
    build:
      context: .
      dockerfile: src/Dockerfile
    working_dir: /app
    command:
      - uv
      - run
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "5000"
    env_file: ".env"
    ports:
      - 5000:5000
    depends_on:
      database:
        condition: service_healthy
    networks:
      - network

networks:
  network:
    driver: bridge
